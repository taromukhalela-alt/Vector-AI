<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d2021">
  <title>Study Notes - Vector AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .notes-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: var(--space-lg);
      padding: var(--space-lg);
      max-width: 1400px;
      margin: 0 auto;
      min-height: calc(100vh - 56px);
    }

    .notes-sidebar {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .notes-search {
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: var(--font-size-sm);
    }

    .notes-search:focus {
      outline: none;
      border-color: var(--accent);
    }

    .create-note-btn {
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      background: var(--accent);
      color: var(--bg-hard);
      border: none;
      border-radius: var(--radius-lg);
      font-family: var(--font-body);
      font-weight: 600;
      font-size: var(--font-size-sm);
      cursor: pointer;
      transition: filter 0.15s;
    }

    .create-note-btn:hover { filter: brightness(1.15); }

    .sidebar-section-label {
      font-size: var(--font-size-xs);
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-sm);
    }

    .quick-prompt-chip {
      display: block;
      width: 100%;
      text-align: left;
      padding: var(--space-xs) var(--space-sm);
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: var(--font-size-xs);
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: var(--space-xs);
    }

    .quick-prompt-chip:hover { background: var(--bg-2); }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-md);
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .note-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .note-card-title {
      font-size: var(--font-size-md);
      font-weight: 600;
      color: var(--text);
      margin-bottom: var(--space-xs);
    }

    .note-card-meta {
      font-size: var(--font-size-xs);
      color: var(--text-faint);
      margin-bottom: var(--space-sm);
    }

    .note-card-topic {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--bg-hard);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-sm);
    }

    .note-card-content {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
    }

    .note-card-content strong { color: var(--fg); }
    .note-card-content code {
      background: var(--bg-2);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 0.8em;
    }

    .note-card-actions {
      display: flex;
      gap: var(--space-xs);
      margin-top: var(--space-sm);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--border);
    }

    .note-action-btn {
      padding: 4px 10px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: var(--font-size-xs);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .note-action-btn:hover {
      background: var(--accent);
      color: var(--bg-hard);
      border-color: var(--accent);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-xl);
      color: var(--text-faint);
    }

    .empty-state h3 { color: var(--text); margin-bottom: var(--space-sm); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 620px;
      max-height: 90vh;
      overflow-y: auto;
      padding: var(--space-lg);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-md);
    }

    .modal-header h2 {
      margin: 0;
      font-size: var(--font-size-lg);
      color: var(--text);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--accent); }

    .form-input {
      width: 100%;
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: var(--font-size-sm);
      margin-bottom: var(--space-sm);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea.form-input { min-height: 160px; resize: vertical; font-family: var(--font-mono); font-size: 0.85rem; }

    .ai-toggle {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      font-size: var(--font-size-sm);
      color: var(--text-muted);
    }

    .ai-toggle input[type="checkbox"] {
      accent-color: var(--accent);
    }

    .modal-footer {
      display: flex;
      gap: var(--space-sm);
      justify-content: flex-end;
      margin-top: var(--space-md);
    }

    @media (max-width: 768px) {
      .notes-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-logo">Vector AI</div>
    <nav class="tab-nav" role="tablist">
      <a class="tab-btn tab-link" href="/chat">Tutor</a>
      <a class="tab-btn tab-link" href="/chat?tab=animations">Visual Lab</a>
      <a class="tab-btn tab-link" href="/chat?tab=topics">CAPS Tracks</a>
      <a class="tab-btn tab-link active" href="/notes">Notes</a>
    </nav>
  </header>

  <main class="notes-layout">
    <aside class="notes-sidebar">
      <input type="text" id="note-search" class="notes-search" placeholder="Search notes...">

      <button id="create-note-btn" class="create-note-btn">+ New Note</button>

      <div>
        <div class="sidebar-section-label">Quick AI Notes</div>
        <button class="quick-prompt-chip" onclick="createFromTopic('kinematics')">Kinematics</button>
        <button class="quick-prompt-chip" onclick="createFromTopic('electricity')">Electricity</button>
        <button class="quick-prompt-chip" onclick="createFromTopic('waves')">Waves & Sound</button>
        <button class="quick-prompt-chip" onclick="createFromTopic('chemistry')">Chemistry</button>
        <button class="quick-prompt-chip" onclick="createFromTopic('energy')">Energy</button>
        <button class="quick-prompt-chip" onclick="createFromTopic('forces')">Newton's Laws</button>
      </div>
    </aside>

    <section>
      <div id="notes-grid" class="notes-grid"></div>
      <div id="empty-state" class="empty-state hidden">
        <h3>No notes yet</h3>
        <p>Create your first AI-assisted study note to get started.</p>
      </div>
    </section>
  </main>

    <!-- Modal -->
  <div id="note-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">Create New Note</h2>
        <div>
          <button id="toggle-view-btn" class="note-action-btn hidden" onclick="toggleViewEdit()" type="button">Edit</button>
          <button class="note-action-btn ai-gen-btn" onclick="generateAINote()" type="button" style="color:var(--aqua); border-color:var(--aqua);">✨ Generate with AI</button>
          <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
      </div>
      <form id="note-form">
        <input type="text" id="note-title" class="form-input" placeholder="Note Title" required>
        <input type="text" id="note-topic" class="form-input" placeholder="Topic (e.g. Projectile Motion)">
        
        <div id="note-preview-container" class="form-input" style="display:none; min-height: 160px; overflow-y:auto;">
          <div id="note-preview" class="markdown-body" style="font-family: var(--font-body); font-size: 0.95rem; line-height: 1.6; color: var(--fg);"></div>
        </div>
        
        <textarea id="note-content" class="form-input" placeholder="Write your note or ask AI to generate one..."></textarea>
        
        <div class="modal-footer">
          <button type="button" class="note-action-btn" onclick="closeModal()">Cancel</button>
          <button type="submit" class="create-note-btn" style="width:auto;">Save Note</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='main.js') }}"></script>
  <script src="{{ url_for('static', filename='notes.js') }}"></script>
</body>
</html>
