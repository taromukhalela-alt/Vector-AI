<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="tile" x1="10" y1="5" x2="54" y2="59" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1d1c"/>
      <stop offset="1" stop-color="#0a0c0b"/>
    </linearGradient>
    <linearGradient id="neon" x1="15" y1="14" x2="49" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2ca579"/>
      <stop offset=".5" stop-color="#13900a"/>
      <stop offset="1" stop-color="#0d7006"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#tile)"/>

  <!-- Atom orbits (simplified for small size) -->
  <ellipse cx="32" cy="32" rx="22" ry="10" fill="none" stroke="#13900a" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="22" ry="10" fill="none" stroke="#2ca579" stroke-width="1.5" opacity="0.4" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="22" ry="10" fill="none" stroke="#13900a" stroke-width="1.5" opacity="0.4" transform="rotate(120 32 32)"/>

  <!-- V letter -->
  <path d="M18 16 L32 46 L46 16" fill="none" stroke="#050706" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M18 16 L32 46 L46 16" fill="none" stroke="#13900a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <path d="M18 16 L32 46 L46 16" fill="none" stroke="url(#neon)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Electron dots -->
  <circle cx="54" cy="32" r="2.5" fill="#0a0c0b" stroke="#13900a" stroke-width="1.5"/>
  <circle cx="20" cy="51" r="2" fill="#0a0c0b" stroke="#2ca579" stroke-width="1"/>

  <!-- Center nucleus -->
  <circle cx="32" cy="46" r="4" fill="#0a0c0b" stroke="#13900a" stroke-width="2"/>
  <circle cx="32" cy="46" r="2" fill="#13900a"/>
</svg>
